<!DOCTYPE html>
<html>
<head>
    <title>SolarScope</title>
    <style>
        body {
            background-color: #0b0b1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            padding: 40px;
        }

        .left-panel {
            flex: 1;
        }

        h1 {
            font-size: 40px;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 40px;
        }

        .distance-row {
            margin-bottom: 20px;
        }

        .distance-label {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 4px;
        }

        .distance-box {
            border: 2px solid #555;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 22px;
            width: fit-content;
        }

        ..right-panel {
    flex: 1;
    position: relative;
    height: 500px;
    overflow: hidden;
}

.sun {
    position: absolute;
    top: 50%;
    right: -180px;
    transform: translateY(-50%);
    width: 400px;
    height: 400px;
    background: radial-gradient(circle at 35% 35%, #fff7cc, #ffcc33 55%, #ff8800);
    border-radius: 50%;
    box-shadow: 0 0 100px 40px rgba(255, 170, 0, 0.5);
    animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
    0%   { box-shadow: 0 0 100px 40px rgba(255, 170, 0, 0.5); }
    50%  { box-shadow: 0 0 140px 60px rgba(255, 170, 0, 0.75); }
    100% { box-shadow: 0 0 100px 40px rgba(255, 170, 0, 0.5); }
}
}
    </style>
</head>
<body>
    <div class="left-panel">
        <h1>SolarScope</h1>
        <p class="subtitle">Distance was never constant.</p>

        <p>Distance of Sun from Earth</p>

        <div class="distance-row">
            <div class="distance-label">In KM</div>
            <div class="distance-box" id="km">--</div>
        </div>

        <div class="distance-row">
            <div class="distance-label">In Miles</div>
            <div class="distance-box" id="miles">--</div>
        </div>

        <div class="distance-row">
            <div class="distance-label">In AU</div>
            <div class="distance-box" id="au">--</div>
        </div>
    </div>

    <div class="right-panel">
    <div class="sun"></div>
    </div>

    <script>
        async function updateDistance() {
            const response = await fetch('/api/sun');
            const data = await response.json();

            document.getElementById('km').textContent = data.distance_km.toLocaleString() + " km";
            document.getElementById('miles').textContent = data.distance_miles.toLocaleString() + " miles";
            document.getElementById('au').textContent = data.distance_au + " AU";
        }

        updateDistance();
        setInterval(updateDistance, 2000);
    </script>
</body>
</html>
